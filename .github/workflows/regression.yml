name: Regression tests

on:
  push:
    tags:
      - 'release/*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'RELEASE_TAG to label this run (e.g. 2026.07-R2). Defaults to the release/<tag> being pushed.'
        required: false
        default: ''

jobs:
  regression:
    runs-on: ubuntu-latest
    env:
      # See smoke.yml: this repo doesn't contain the app's source, so CI
      # needs BASE_URL pointed at a reachable deployment. Configure it in
      # Settings > Secrets and variables > Actions > Variables > BASE_URL.
      BASE_URL: ${{ vars.BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Resolve RELEASE_TAG
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          elif [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            TAG="${GITHUB_REF#refs/tags/release/}"
          else
            TAG="local"
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Run regression suite
        id: tests
        run: npm run test:regression
        continue-on-error: true

      - name: Extract result summary
        id: summary
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            let stats = { expected: 0, unexpected: 0, skipped: 0 };
            try { stats = JSON.parse(fs.readFileSync('reports/${{ env.RELEASE_TAG }}/results.json', 'utf8')).stats; } catch (e) {}
            fs.appendFileSync(process.env.GITHUB_OUTPUT, [
              'passed=' + stats.expected,
              'failed=' + stats.unexpected,
              'skipped=' + stats.skipped,
            ].join('\n') + '\n');
          "

      - name: Email results
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: SkyRoute CI <${{ secrets.MAIL_USERNAME }}>
          to: ${{ vars.NOTIFY_EMAIL || 'nipun.grover@gmail.com' }}
          subject: "SkyRoute regression tests (${{ env.RELEASE_TAG }}): ${{ steps.tests.outcome }} (${{ steps.summary.outputs.passed }} passed, ${{ steps.summary.outputs.failed }} failed, ${{ steps.summary.outputs.skipped }} skipped)"
          body: |
            Regression suite result: ${{ steps.tests.outcome }}
            Release tag: ${{ env.RELEASE_TAG }}

            Passed:  ${{ steps.summary.outputs.passed }}
            Failed:  ${{ steps.summary.outputs.failed }}
            Skipped: ${{ steps.summary.outputs.skipped }}

            Full run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ env.RELEASE_TAG }}
          path: reports/${{ env.RELEASE_TAG }}/**
          retention-days: 90
