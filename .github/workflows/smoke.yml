name: Smoke tests

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      # This repo is a black-box test suite — it doesn't contain the
      # SkyRoute app's source, so CI can't start it itself. Point BASE_URL
      # at a reachable deployment (staging, preview environment, etc.) via
      # Settings > Secrets and variables > Actions > Variables > BASE_URL.
      BASE_URL: ${{ vars.BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Validate test case registry
        run: npm run validate:test-registry

      - name: Run smoke suite
        id: tests
        run: npm run test:smoke
        continue-on-error: true

      - name: Extract result summary
        id: summary
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            let stats = { expected: 0, unexpected: 0, skipped: 0 };
            try { stats = JSON.parse(fs.readFileSync('reports/local/results.json', 'utf8')).stats; } catch (e) {}
            fs.appendFileSync(process.env.GITHUB_OUTPUT, [
              'passed=' + stats.expected,
              'failed=' + stats.unexpected,
              'skipped=' + stats.skipped,
            ].join('\n') + '\n');
          "

      - name: Email results
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: SkyRoute CI <${{ secrets.MAIL_USERNAME }}>
          to: ${{ vars.NOTIFY_EMAIL || 'nipun.grover@gmail.com' }}
          subject: "SkyRoute smoke tests: ${{ steps.tests.outcome }} (${{ steps.summary.outputs.passed }} passed, ${{ steps.summary.outputs.failed }} failed, ${{ steps.summary.outputs.skipped }} skipped)"
          body: |
            Smoke suite result: ${{ steps.tests.outcome }}

            Passed:  ${{ steps.summary.outputs.passed }}
            Failed:  ${{ steps.summary.outputs.failed }}
            Skipped: ${{ steps.summary.outputs.skipped }}

            Full run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_id }}
          path: reports/local/**
          retention-days: 14
